server {
    listen 5173;
    server_name localhost;
 
    root   /usr/share/nginx/html;
    index  index.html;
 
    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;
    gzip_min_length 1024;
 
    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite fingerprints asset filenames on every build, so we can cache them
    # aggressively.  index.html must never be cached so users always get the
    # latest entry point.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
 
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
 
    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the Flask backend container.
    # Using the Docker Compose service name "backend" as the upstream host —
    # Docker's internal DNS resolves it automatically within the shared network.
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
 
    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Any path that doesn't match a real file (JS bundle, image, etc.) or the
    # /api proxy is served index.html so React Router can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
